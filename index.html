<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>KS1 ALKEBULAN PAY – [Trade Support]</title>
  <style>
    body { background: #050A16; color: white; font-family: sans-serif; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; }
    .btn { background: #D4AF37; color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1>[Service Name] Dashboard</h1>
    <div id="user-info" class="card">Loading...</div>
    <button class="btn" onclick="logout()">Logout</button>
  </div>

  <script>
    const token = localStorage.getItem('ks1_jwt_token');
    if (!token) {
      window.location.href = 'https://ks1-alkebulan-pay-identity-hub.pages.dev';
    }

    async function loadUser() {
      try {
        const res = await fetch('https://ks1-central-auth.onrender.com/auth/verify', {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Session expired');
        const user = await res.json();
        document.getElementById('user-info').innerHTML = `
          <p>Welcome, user!</p>
          <p>Trade ID: ${user.trade_id || user.user_id}</p>
        `;
      } catch (err) {
        alert('Please log in again.');
        window.location.href = 'https://ks1-alkebulan-pay-identity-hub.pages.dev';
      }
    }

    function logout() {
      localStorage.removeItem('ks1_jwt_token');
      window.location.href = 'https://ks1-alkebulan-pay-identity-hub.pages.dev';
    }

    loadUser();
  </script>
</body>
</html>
