<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trade Support Dashboard</title>
  <style>
    :root { --deep-blue: #002147; --gold: #D4AF37; --green: #4CAF50; --red: #f44336; }
    * { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif; }
    body { background: var(--deep-blue); color:white; padding:20px; min-height:100vh; display:flex; justify-content:center; align-items:center; }
    .container { max-width:600px; width:100%; text-align:center; }
    h1 { color: var(--gold); margin-bottom:20px; font-size:28px; }
    .card { background:rgba(255,255,255,0.1); padding:20px; border-radius:12px; margin:20px 0; }
    .status-card { background:rgba(0,0,0,0.2); padding:16px; border-radius:12px; margin:20px 0; text-align:left; }
    .status-card.eligible { border-left:4px solid var(--green); background:rgba(76,175,80,0.15); }
    .status-card.not-eligible { border-left:4px solid var(--red); background:rgba(244,67,54,0.15); }
    .btn { background: var(--gold); color: var(--deep-blue); border:none; padding:12px 24px; border-radius:8px; font-weight:bold; cursor:pointer; margin:12px 0; width:100%; font-size:16px; }
    .logout { background:#ff6b6b; }
    footer { margin-top:40px; font-size:12px; color:#bbb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>KS1 ALKEBULAN PAY</h1>
    <div class="card">
      <h2>Welcome, <span id="tradeId">—</span>!</h2>
      <p>Check your eligibility for SME support programs.</p>
    </div>
    <div id="eligibilityStatus"><p>Loading eligibility...</p></div>
    <button class="btn" onclick="checkEligibility()">Refresh Eligibility</button>
    <button class="btn secondary" onclick="viewHistory()">View Support History</button>
    <button class="btn logout" onclick="logout()">Logout</button>

    <footer>
      <p>© 2026 KS1 ALKEBULAN PAY – A Nonprofit Project By KS1 Empire Group & Foundation (KS1EGF)</p>
    </footer>
  </div>

  <script>
    const token = localStorage.getItem('ks1_token');
    const tradeId = localStorage.getItem('ks1_tradeId');

    if (!token || !tradeId) {
      window.location.href = 'index.html';
    }

    document.getElementById('tradeId').textContent = tradeId;

    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    async function checkEligibility() {
      const div = document.getElementById('eligibilityStatus');
      div.innerHTML = '<p>Checking eligibility...</p>';
      try {
        const res = await fetch(`https://ks1-alkebulan-pay-backend.onrender.com/eligibility/status/${tradeId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        // Check if response is JSON
        const contentType = res.headers.get('content-type');
        if (!res.ok || !contentType || !contentType.includes('application/json')) {
          throw new Error('Failed to load eligibility data. Please try again.');
        }

        const data = await res.json();
        let html = `<h3>Eligibility Status: <strong>${data.eligible ? '✅ ELIGIBLE' : '❌ NOT ELIGIBLE'}</strong></h3>`;
        if (data.eligible) {
          html += `<p><strong>Max Support Amount:</strong> GHS ${data.maxFundingAmount.toFixed(2)}</p>`;
          html += `<p>Support is provided by donor or institutional partners. Contact support team to proceed.</p>`;
        } else {
          html += `<p>You need:</p><ul>`;
          if (data.reputationScore < 70) html += `<li>Reputation ≥ 70 (yours: ${data.reputationScore})</li>`;
          if (data.totalVolume < 1000) html += `<li>Trade volume ≥ GHS 1,000 (yours: GHS ${data.totalVolume})</li>`;
          if (data.disputes >= 5) html += `<li>Fewer than 5 disputes (yours: ${data.disputes})</li>`;
          html += `</ul>`;
        }

        div.innerHTML = html;
        div.className = `status-card ${data.eligible ? 'eligible' : 'not-eligible'}`;
      } catch (err) {
        console.error('Eligibility error:', err);
        div.innerHTML = `<p style="color:#ff6b6b;">⚠️ ${err.message}</p>`;
      }
    }

    // Load on startup
    checkEligibility();

    function viewHistory() {
      alert('Support history will be available soon.');
    }
  </script>
</body>
</html>
