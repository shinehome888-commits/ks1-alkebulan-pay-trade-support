<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Identity Hub – KS1 ALKEBULAN PAY</title>
  <style>
    body { background: #050A16; color: white; font-family: sans-serif; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; margin: 10px 0; }
    .btn { background: #D4AF37; color: #000; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    .logout { background: #ff4d4d; }
  </style>
</head>
<body>
  <div class="container">
    <h1>KS1 Identity Hub</h1>
    <div id="profile" class="card">Loading...</div>
    <button class="btn logout" onclick="logout()">Logout</button>
  </div>

  <script>
    const token = localStorage.getItem('ks1_jwt_token');
    if (!token) {
      window.location.href = 'login.html';
    }

    async function loadProfile() {
      try {
        const res = await fetch('https://ks1-central-auth.onrender.com/auth/verify', {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Invalid session');
        const user = await res.json();
        document.getElementById('profile').innerHTML = `
          <h2>Welcome, User</h2>
          <p><strong>KS1 Trade ID:</strong> ${user.trade_id || user.user_id}</p>
          <p><strong>Role:</strong> ${user.role}</p>
          <p><strong>Status:</strong> Verified ✅</p>
        `;
      } catch (err) {
        alert('Session expired. Please log in again.');
        localStorage.removeItem('ks1_jwt_token');
        window.location.href = 'login.html';
      }
    }

    function logout() {
      localStorage.removeItem('ks1_jwt_token');
      window.location.href = 'login.html';
    }

    loadProfile();
  </script>
</body>
</html>
